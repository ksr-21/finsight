<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - FinSight AI</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f9fafb;
            color: #111827;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 16px;
            color: #4F46E5;
        }
        p {
            font-size: 16px;
            line-height: 1.5;
            color: #4b5563;
            margin-bottom: 24px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        button {
            background-color: #4F46E5;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #4338ca;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/logo.svg" alt="FinSight AI Logo" class="logo">
        <h1>You're Offline</h1>
        <p>It looks like you don't have an internet connection right now. Some parts of the app may be unavailable until you're back online.</p>
        <button onclick="window.location.reload()">Retry Connection</button>
    </div>
    <script>
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
